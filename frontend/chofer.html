<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Chofer | Kosmos GPS</title>
</head>
<body>
    <h1>Portal del Operador Logístico</h1>
    <button id="btnSalir">Cerrar Sesión</button>

    <h3>Mis Credenciales</h3>
    <ul>
        <li><strong>Nombre:</strong> <span id="infoNombre"></span></li>
        <li><strong>Licencia:</strong> <span id="infoLicencia"></span></li>
        <li><strong>Estatus Actual:</strong> <span id="infoEstatus"></span></li>
    </ul>

    <h3>Mis Viajes Asignados</h3>
    <ul id="listaMisViajes"></ul>

    <script>
        if (localStorage.getItem('rol') !== 'chofer') window.location.href = '/login.html';

        const chofer = JSON.parse(localStorage.getItem('datosChofer'));
        
        if (chofer) {
            document.getElementById('infoNombre').innerText = chofer.nombre;
            document.getElementById('infoLicencia').innerText = chofer.licencia;
            document.getElementById('infoEstatus').innerText = chofer.estatus || 'Activo';
            cargarMisViajes(chofer.id);
        }

        document.getElementById('btnSalir').onclick = () => {
            localStorage.clear();
            window.location.href = '/login.html';
        };

        async function cargarMisViajes(idChofer) {
            const res = await fetch(`/api/viajes/chofer/${idChofer}`);
            const viajes = await res.json();
            const lista = document.getElementById('listaMisViajes');

            if (viajes.length === 0) {
                lista.innerHTML = '<li>No tienes viajes asignados actualmente.</li>';
                return;
            }

            lista.innerHTML = viajes.map(v => `
                <li style="margin-bottom: 15px;">
                    📍 <strong>Ruta:</strong> ${v.origen} ➡️ ${v.destino} <br>
                    🚛 <strong>Unidad:</strong> ${v.modelo} [Placa: ${v.placa}] <br>
                    🏷️ <strong>Estatus del Viaje:</strong> ${v.estatus} <br>
                    📅 <strong>Fecha de Asignación:</strong> ${new Date(v.fecha_salida).toLocaleString()}<br>
                    👤 <strong>Asignado por:</strong> ${v.asignado_por}
                    <hr>
                </li>
            `).join('');
        }
    </script>
</body>
</html>
