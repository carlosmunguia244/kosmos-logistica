<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | Kosmos GPS</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <h1>Bienvenido a KOSMOS GPS</h1>
        
        <h2>Acceso Administrador</h2>
        <form id="formLoginAdmin">
            <input type="text" id="adminUsuario" placeholder="Usuario" required>
            <input type="password" id="adminPassword" placeholder="Contraseña" required>
            <button type="submit">Entrar como Admin</button>
        </form>

        <br><hr><br>

        <h2>Acceso Chofer</h2>
        <form id="formLoginChofer">
            <input type="text" id="loginLicencia" placeholder="Número de Licencia" required>
            <button type="submit">Entrar como Chofer</button>
        </form>
    </div>

    <script>
        const API_AUTH_ADMIN = '/api/auth/admin';
        const API_AUTH_CHOFER = '/api/auth/chofer';

        // Redirección si ya hay sesión
        const rolActivo = localStorage.getItem('rol');
        if (rolActivo === 'admin') window.location.href = '/admin.html';
        if (rolActivo === 'chofer') window.location.href = '/chofer.html';

        document.getElementById('formLoginAdmin').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(API_AUTH_ADMIN, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    usuario: document.getElementById('adminUsuario').value, 
                    password: document.getElementById('adminPassword').value 
                })
            });
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('rol', 'admin');
                localStorage.setItem('usuario', data.usuario);
                window.location.href = '/admin.html';
            } else { alert('Credenciales incorrectas'); }
        };

        document.getElementById('formLoginChofer').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(API_AUTH_CHOFER, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ licencia: document.getElementById('loginLicencia').value })
            });
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('rol', 'chofer');
                localStorage.setItem('datosChofer', JSON.stringify(data.datos));
                window.location.href = '/chofer.html';
            } else { alert('Licencia no encontrada'); }
        };
    </script>
</body>
</html>
